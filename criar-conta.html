<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Primeiro Acesso</h1>
    <form>
        <label for="nome">Nome Completo</label>
        <input type="text" name="nome" id="nome" required/>

        <br/>
        <br/>

        <label for="email">Email</label>
        <input type="email" name="email" id="email" required/>

        <br/>
        <br/>
        
        <label for="data de nascimento">Data de Nascimento</label>
        <input type="date" name="data de nascimento" id="data de nascimento" required/>

        <br/>
        <br/>

        <label for="cidade">Cidade de Origem</label>
        <select name=cidade id="cidade" required>
            <option value="">Selecione a cidade</option>
            <option value="sao paulo">São Paulo</option>
            <option value="rio de janeiro">Rio de Janeiro</option>
            <option value="belo horizonte">Belo Horizonte</option>
        </select>

        <br/>
        <br/>

        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" required maxlength="7"/>
        
        <br/>
        <br/>

       <input type="checkbox" name="termo" id="termo" required/>
       <label for="termo">Aceito os termos e condições</label>

       <br/>       

       <button type="submit">Criar Conta</button>
    </form>
</body>
</html>
